<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrollTrigger · scrub</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .scrub-stage { height: 100vh; display: grid; place-items: center; position: sticky; top: 0; overflow: hidden; }
    .shape {
      width: 180px; height: 180px; border-radius: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 30px 80px rgba(10,228,72,.25);
      display: grid; place-items: center;
      font-weight: 800; font-size: 14px; color: #04240f; letter-spacing: .04em;
    }
    .track { height: 300vh; }
    .progress {
      position: fixed; top: 0; left: 0; height: 4px; width: 100%;
      transform: scaleX(0); transform-origin: 0 50%;
      background: var(--accent); z-index: 40;
    }
    .label { position: fixed; top: 16px; left: 16px; z-index: 41; }
  </style>
</head>
<body>
  <div class="progress" id="bar"></div>
  <div class="label"><span class="tag">scrub: true</span></div>

  <div class="track">
    <div class="scrub-stage">
      <div class="shape" id="shape">SCRUB</div>
    </div>
  </div>

  <div class="scroll-hint"><span class="arrow">↓</span> o scroll controla a animação</div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    // A posição da animação = posição exata do scroll (scrub).
    gsap.to("#shape", {
      rotation: 270,
      scale: 1.6,
      borderRadius: "50%",
      background: "linear-gradient(135deg, #a78bfa, #38bdf8)",
      ease: "none",
      scrollTrigger: {
        trigger: ".track",
        start: "top top",
        end: "bottom bottom",
        scrub: true
      }
    });

    gsap.to("#bar", {
      scaleX: 1, ease: "none",
      scrollTrigger: { trigger: ".track", start: "top top", end: "bottom bottom", scrub: true }
    });
  </script>
</body>
</html>
