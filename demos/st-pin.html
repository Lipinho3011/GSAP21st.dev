<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrollTrigger · pin</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .spacer { height: 60vh; display: grid; place-items: center; color: var(--muted); font-size: 13px; letter-spacing: .1em; text-transform: uppercase; }
    .pin-stage {
      height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(60% 60% at 50% 40%, rgba(10,228,72,.10), transparent 70%),
        var(--bg);
    }
    .pin-card {
      width: min(80%, 360px);
      padding: 36px 28px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      backdrop-filter: blur(8px);
      text-align: center;
    }
    .pin-card h2 { font-size: 1.6rem; margin: 14px 0 18px; }
    .reveal-line {
      opacity: .15;
      font-size: 1.05rem;
      font-weight: 600;
      padding: 9px 0;
      border-top: 1px solid var(--border);
    }
    .progress {
      position: fixed; top: 0; left: 0; height: 4px; width: 100%;
      transform: scaleX(0); transform-origin: 0 50%;
      background: var(--accent); z-index: 40;
    }
  </style>
</head>
<body>
  <div class="progress" id="bar"></div>

  <div class="spacer">role para baixo ↓</div>

  <section class="pin-stage" id="stage">
    <div class="pin-card">
      <span class="tag">pin: true</span>
      <h2>Seção fixa</h2>
      <div class="reveal-line">A seção trava na tela…</div>
      <div class="reveal-line">…enquanto o conteúdo anima…</div>
      <div class="reveal-line">…e só então libera o scroll.</div>
    </div>
  </section>

  <div class="spacer">fim do exemplo</div>

  <div class="scroll-hint"><span class="arrow">↓</span> role dentro deste quadro</div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: "#stage",
        start: "top top",
        end: "+=120%",
        pin: true,          // a seção fica fixa
        scrub: true,        // o progresso segue o scroll
      }
    });

    tl.to(".reveal-line", { opacity: 1, stagger: 0.5, ease: "none" });

    gsap.to("#bar", {
      scaleX: 1, ease: "none",
      scrollTrigger: { trigger: document.body, start: "top top", end: "bottom bottom", scrub: true }
    });
  </script>
</body>
</html>
