<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrollSmoother · parallax</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .hero {
      position: relative; height: 100vh; overflow: hidden;
      display: grid; place-items: center;
    }
    .layer { position: absolute; inset: -10% 0; }
    .bg {
      background:
        radial-gradient(40% 30% at 20% 30%, rgba(10,228,72,.30), transparent 60%),
        radial-gradient(50% 40% at 80% 70%, rgba(56,189,248,.30), transparent 60%),
        #06080b;
    }
    .mid {
      background-image: radial-gradient(rgba(255,255,255,.5) 1.5px, transparent 1.6px);
      background-size: 38px 38px; opacity: .25;
    }
    .hero h1 {
      position: relative; z-index: 2;
      font-size: clamp(2.5rem, 12vw, 7rem); font-weight: 900; letter-spacing: -.04em;
    }
    .content { padding: 90px 28px; background: var(--bg-2); }
    .content h2 { font-size: 2rem; font-weight: 800; }
    .content p { color: var(--muted); margin-top: 12px; max-width: 46ch; }
    .label { position: fixed; top: 16px; left: 16px; z-index: 41; }
  </style>
</head>
<body>
  <div class="label"><span class="tag">data-speed</span></div>

  <div id="smooth-wrapper">
    <div id="smooth-content">
      <section class="hero">
        <div class="layer bg"  data-speed="0.5"></div>   <!-- fundo mais lento -->
        <div class="layer mid" data-speed="0.8"></div>
        <h1 data-speed="1.25">PARALLAX</h1>                <!-- título mais rápido -->
      </section>
      <section class="content">
        <h2>Camadas em velocidades diferentes</h2>
        <p>O fundo se move devagar (data-speed="0.5"), os pontos num ritmo médio e o título mais rápido. Isso cria profundidade — só com um atributo.</p>
      </section>
    </div>
  </div>

  <div class="scroll-hint"><span class="arrow">↓</span> role para ver as camadas</div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollSmoother.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger, ScrollSmoother);
    ScrollSmoother.create({ smooth: 1.4, effects: true }); // effects: true ativa o data-speed
  </script>
</body>
</html>
