<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MorphSVGPlugin</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .sub { color: var(--muted); font-size: 13px; }
    svg { width: min(60%, 200px); height: auto; }
    #icon { fill: url(#grad); filter: drop-shadow(0 8px 24px rgba(167,139,250,.4)); }
  </style>
</head>
<body>
  <div class="corner-tag"><span class="tag">MorphSVGPlugin</span></div>
  <div class="stage">
    <svg viewBox="0 0 100 100">
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#0ae448" />
          <stop offset="0.5" stop-color="#38bdf8" />
          <stop offset="1" stop-color="#a78bfa" />
        </linearGradient>
      </defs>
      <path id="icon" d="M50,12 C72,12 90,28 88,50 C86,72 70,90 48,88 C26,86 10,68 14,46 C18,24 28,12 50,12 Z" />
    </svg>
    <p class="sub">um path SVG vira outro — formas líquidas</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/MorphSVGPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(MorphSVGPlugin);
    const shapes = [
      "M50,88 C20,60 8,42 8,28 C8,14 20,8 32,8 C42,8 48,16 50,22 C52,16 58,8 68,8 C80,8 92,14 92,28 C92,42 80,60 50,88 Z", // coração
      "M50,6 L61,38 L95,38 L67,58 L78,92 L50,72 L22,92 L33,58 L5,38 L39,38 Z", // estrela
      "M50,12 C72,12 90,28 88,50 C86,72 70,90 48,88 C26,86 10,68 14,46 C18,24 28,12 50,12 Z" // blob
    ];
    const tl = gsap.timeline({ repeat: -1 });
    shapes.forEach((d) => {
      tl.to("#icon", { duration: 1, morphSVG: d, ease: "power2.inOut" }, "+=0.7");
    });
  </script>
</body>
</html>
