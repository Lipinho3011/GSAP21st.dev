<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InertiaPlugin</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    body { overflow: hidden; }
    .rink {
      position: absolute; inset: 16px;
      border: 1px solid var(--border); border-radius: 18px;
      background: radial-gradient(60% 60% at 50% 50%, rgba(56,189,248,.08), transparent);
    }
    .puck {
      position: absolute; top: 50%; left: 50%; width: 78px; height: 78px;
      margin: -39px 0 0 -39px; border-radius: 50%; cursor: grab; touch-action: none; user-select: none;
      background: radial-gradient(circle at 35% 30%, #7dd3fc, #1d6fae);
      box-shadow: 0 14px 36px rgba(56,189,248,.35);
      display: grid; place-items: center; color: #04222e; font-weight: 800; font-size: 12px;
    }
    .puck:active { cursor: grabbing; }
    .hint-bottom { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="corner-tag"><span class="tag">Draggable + Inertia</span></div>
  <div class="rink"></div>
  <div class="puck">flick</div>
  <span class="hint-bottom">arraste e solte com força — ele desliza</span>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/InertiaPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(Draggable, InertiaPlugin);
    Draggable.create(".puck", {
      bounds: ".rink",
      inertia: true,
      edgeResistance: 0.75,
      onPress() { gsap.to(this.target, { scale: 1.1, duration: 0.2 }); },
      onRelease() { gsap.to(this.target, { scale: 1, duration: 0.2 }); }
    });
  </script>
</body>
</html>
