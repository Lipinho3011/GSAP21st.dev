<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrollToPlugin</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .nav {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 40;
      display: flex; gap: 6px; padding: 6px; border-radius: 99px;
      background: rgba(10,12,16,.7); border: 1px solid var(--border); backdrop-filter: blur(8px);
    }
    .nav button {
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
      border: 1px solid var(--border); background: transparent; color: var(--muted); font-weight: 700; font-family: inherit;
    }
    .nav button:hover { color: var(--accent); border-color: var(--accent); }
    .sec { height: 100vh; display: grid; place-items: center; font-size: clamp(2.5rem,12vw,6rem); font-weight: 900; }
    .sec:nth-child(1){ background:#0a0f0b; } .sec:nth-child(2){ background:#08121a; }
    .sec:nth-child(3){ background:#0e0a18; } .sec:nth-child(4){ background:#120a10; }
  </style>
</head>
<body>
  <div class="corner-tag"><span class="tag">ScrollToPlugin</span></div>
  <nav class="nav">
    <button data-to="0">1</button><button data-to="1">2</button>
    <button data-to="2">3</button><button data-to="3">4</button>
  </nav>

  <section class="sec" id="s0">01</section>
  <section class="sec" id="s1">02</section>
  <section class="sec" id="s2">03</section>
  <section class="sec" id="s3">04</section>

  <span class="scroll-hint"><span class="arrow">↓</span> clique nos números para rolar suave</span>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollToPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollToPlugin);
    document.querySelectorAll(".nav button").forEach((b) => {
      b.addEventListener("click", () => {
        gsap.to(window, { duration: 1, scrollTo: "#s" + b.dataset.to, ease: "power2.inOut" });
      });
    });
  </script>
</body>
</html>
