<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>future · glitch cromático</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    body { background: #040406; }
    .glitch { position: relative; }
    .glitch .layer {
      grid-area: 1 / 1;
      font-size: clamp(2rem, 11vw, 4.2rem);
      font-weight: 900;
      letter-spacing: -.02em;
      will-change: transform, clip-path;
    }
    .glitch { display: grid; }
    .layer.base { color: #fff; position: relative; z-index: 1; }
    .layer.r { color: #ff2e63; mix-blend-mode: screen; position: absolute; inset: 0; z-index: 2; }
    .layer.c { color: #08d9ff; mix-blend-mode: screen; position: absolute; inset: 0; z-index: 2; }
    .sub { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="corner-tag"><span class="tag">camadas + clip-path + blend</span></div>
  <div class="stage">
    <div class="glitch">
      <span class="layer base">FUTURE</span>
      <span class="layer r">FUTURE</span>
      <span class="layer c">FUTURE</span>
    </div>
    <p class="sub">aberração cromática controlada pelo GSAP</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script>
    function glitch(el, dir) {
      gsap.timeline({ repeat: -1, repeatRefresh: true })
        .set(el, { x: () => dir * gsap.utils.random(2, 7), clipPath: () => {
          const a = gsap.utils.random(0, 70), b = gsap.utils.random(0, 70);
          return `inset(${a}% 0 ${b}% 0)`;
        }})
        .to(el, { duration: 0.09 })
        .set(el, { x: () => -dir * gsap.utils.random(1, 5), clipPath: () => {
          const a = gsap.utils.random(0, 60), b = gsap.utils.random(0, 60);
          return `inset(${a}% 0 ${b}% 0)`;
        }})
        .to(el, { duration: 0.09 })
        .set(el, { x: 0, clipPath: "inset(0 0 0 0)" })
        .to(el, { duration: gsap.utils.random(0.4, 1.4) });
    }
    glitch(".layer.r", 1);
    glitch(".layer.c", -1);
  </script>
</body>
</html>
