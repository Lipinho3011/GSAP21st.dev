<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrollTrigger · snap</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .panel {
      height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
    }
    .panel .big { font-size: clamp(3rem, 18vw, 9rem); font-weight: 900; letter-spacing: -.04em; }
    .panel .sub { position: absolute; bottom: 26%; font-weight: 600; color: rgba(255,255,255,.85); }
    .p1 { background: radial-gradient(70% 70% at 50% 40%, rgba(10,228,72,.18), transparent), #0a0f0b; }
    .p2 { background: radial-gradient(70% 70% at 50% 40%, rgba(56,189,248,.18), transparent), #080d12; }
    .p3 { background: radial-gradient(70% 70% at 50% 40%, rgba(167,139,250,.20), transparent), #0c0a12; }
    .p4 { background: radial-gradient(70% 70% at 50% 40%, rgba(244,114,182,.18), transparent), #120a10; }
    .label { position: fixed; top: 16px; left: 16px; z-index: 41; }
  </style>
</head>
<body>
  <div class="label"><span class="tag">snap</span></div>

  <section class="panel p1"><div class="big">01</div><div class="sub">role um pouco e solte →</div></section>
  <section class="panel p2"><div class="big">02</div><div class="sub">o scroll “encaixa” na seção</div></section>
  <section class="panel p3"><div class="big">03</div><div class="sub">sempre alinhado</div></section>
  <section class="panel p4"><div class="big">04</div><div class="sub">fim</div></section>

  <div class="scroll-hint"><span class="arrow">↓</span> role e solte — ele encaixa</div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    const panels = gsap.utils.toArray(".panel");

    ScrollTrigger.create({
      trigger: document.body,
      start: "top top",
      end: "bottom bottom",
      snap: {
        snapTo: 1 / (panels.length - 1), // encaixa em cada seção
        duration: { min: 0.2, max: 0.5 },
        ease: "power2.inOut"
      }
    });

    // pequeno realce de entrada em cada painel
    panels.forEach((p) => {
      gsap.from(p.querySelector(".big"), {
        scrollTrigger: { trigger: p, start: "top center", toggleActions: "play none none reverse" },
        y: 40, opacity: 0, duration: 0.6, ease: "power3.out"
      });
    });
  </script>
</body>
</html>
