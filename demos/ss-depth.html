<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrollSmoother · profundidade</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .stage { position: relative; height: 130vh; overflow: hidden; background: #05070a; }
    .orb { position: absolute; border-radius: 50%; filter: blur(2px); }
    .o1 { width: 320px; height: 320px; top: 8%; left: -60px; background: radial-gradient(circle, rgba(10,228,72,.5), transparent 70%); }
    .o2 { width: 240px; height: 240px; top: 40%; right: -40px; background: radial-gradient(circle, rgba(56,189,248,.5), transparent 70%); }
    .o3 { width: 180px; height: 180px; top: 70%; left: 20%; background: radial-gradient(circle, rgba(167,139,250,.55), transparent 70%); }
    .title { position: absolute; inset: 0; display: grid; place-items: center; }
    .title h1 { font-size: clamp(2.2rem, 11vw, 6.5rem); font-weight: 900; letter-spacing: -.04em; text-align: center; }
    .after { padding: 90px 28px; background: var(--bg-2); }
    .after h2 { font-size: 2rem; font-weight: 800; }
    .after p { color: var(--muted); margin-top: 12px; max-width: 46ch; }
    .label { position: fixed; top: 16px; left: 16px; z-index: 41; }
  </style>
</head>
<body>
  <div class="label"><span class="tag">profundidade</span></div>

  <div id="smooth-wrapper">
    <div id="smooth-content">
      <section class="stage">
        <div class="orb o1" data-speed="0.6"></div>
        <div class="orb o2" data-speed="1.3"></div>
        <div class="orb o3" data-speed="1.7"></div>
        <div class="title"><h1 data-speed="1.05">PROFUNDIDADE</h1></div>
      </section>
      <section class="after">
        <h2>Vários planos, uma cena</h2>
        <p>Combinando velocidades (data-speed) em fundos, orbes e texto você cria a sensação de 3D. Perfeito para hero, cards e backgrounds grandes.</p>
      </section>
    </div>
  </div>

  <div class="scroll-hint"><span class="arrow">↓</span> role para sentir a profundidade</div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollSmoother.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger, ScrollSmoother);
    ScrollSmoother.create({ smooth: 1.5, effects: true });
  </script>
</body>
</html>
