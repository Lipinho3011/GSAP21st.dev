<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .slots { display: flex; gap: 18px; align-items: center; }
    .slot { border: 1.5px dashed var(--border); border-radius: 16px; display: grid; place-items: center; color: #5e6675; font-size: 11px; }
    .slot.a { width: 92px; height: 92px; }
    .slot.b { width: 150px; height: 110px; }
    .el { width: 100%; height: 100%; border-radius: 14px; background: linear-gradient(135deg, #a78bfa, #38bdf8); display: grid; place-items: center; color: #fff; font-weight: 800; }
    .sub { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="corner-tag"><span class="tag">Flip.getState → from</span></div>
  <div class="stage">
    <div class="slots">
      <div class="slot a" id="a"><div class="el" id="el">FLIP</div></div>
      <div class="slot b" id="b">slot</div>
    </div>
    <p class="sub">o elemento muda de container suavemente</p>
  </div>
  <button class="replay" onclick="toggle()">▶ Mover</button>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/Flip.min.js"></script>
  <script>
    gsap.registerPlugin(Flip);
    const el = document.getElementById("el");
    const a = document.getElementById("a"), b = document.getElementById("b");
    let inA = true;
    function toggle() {
      const state = Flip.getState(el);
      (inA ? b : a).appendChild(el);
      inA = !inA;
      Flip.from(state, { duration: 0.7, ease: "power2.inOut", scale: true });
    }
    setInterval(toggle, 2000);
  </script>
</body>
</html>
