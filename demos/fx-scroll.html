<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texto controlado pelo scroll</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .spacer { height: 70vh; display: grid; place-items: center; color: var(--muted); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; }
    .pinned { height: 100vh; display: grid; place-items: center; padding: 24px; text-align: center; }
    .reveal { font-size: clamp(1.5rem, 6.5vw, 2.8rem); font-weight: 800; line-height: 1.15; max-width: 18ch; }
    .reveal .word { display: inline-block; opacity: .12; }
    .progress { position: fixed; top: 0; left: 0; height: 4px; width: 100%; transform: scaleX(0); transform-origin: 0 50%; background: var(--accent); z-index: 40; }
    .corner-tag { z-index: 42; }
  </style>
</head>
<body>
  <div class="progress" id="bar"></div>
  <div class="corner-tag"><span class="tag">SplitText + ScrollTrigger</span></div>

  <div class="spacer">role para baixo ↓</div>
  <section class="pinned" id="pin">
    <h2 class="reveal" id="h">As palavras aparecem conforme você rola a página.</h2>
  </section>
  <div class="spacer">fim</div>

  <div class="scroll-hint"><span class="arrow">↓</span> role dentro do quadro</div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger, SplitText);
    const split = new SplitText("#h", { type: "words" });
    split.words.forEach(w => w.classList.add("word"));

    gsap.to(".reveal .word", {
      opacity: 1, ease: "none", stagger: 0.4,
      scrollTrigger: { trigger: "#pin", start: "top top", end: "+=120%", pin: true, scrub: true }
    });

    gsap.to("#bar", { scaleX: 1, ease: "none",
      scrollTrigger: { trigger: document.body, start: "top top", end: "bottom bottom", scrub: true } });
  </script>
</body>
</html>
