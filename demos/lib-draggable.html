<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draggable</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    body { overflow: hidden; }
    .stage { gap: 0; }
    .drag {
      position: absolute; width: 88px; height: 88px; border-radius: 18px;
      display: grid; place-items: center; cursor: grab; font-weight: 800; color: #04240f;
      touch-action: none; user-select: none;
    }
    .drag:active { cursor: grabbing; }
    .d1 { background: linear-gradient(135deg,#0ae448,#0b7a35); top: 28%; left: 22%; }
    .d2 { background: linear-gradient(135deg,#38bdf8,#1d6fae); top: 46%; left: 50%; color: #fff; }
    .d3 { background: linear-gradient(135deg,#a78bfa,#6d4ed6); top: 30%; left: 66%; color: #fff; }
    .hint-bottom { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="corner-tag"><span class="tag">Draggable</span></div>
  <div class="stage">
    <div class="drag d1">arr</div>
    <div class="drag d2">aste</div>
    <div class="drag d3">→</div>
  </div>
  <span class="hint-bottom">arraste os blocos (mouse ou toque)</span>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/Draggable.min.js"></script>
  <script>
    gsap.registerPlugin(Draggable);
    Draggable.create(".drag", {
      bounds: "body",
      onPress() { gsap.to(this.target, { scale: 1.12, duration: 0.2 }); },
      onRelease() { gsap.to(this.target, { scale: 1, duration: 0.2 }); }
    });
  </script>
</body>
</html>
