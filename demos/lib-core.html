<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSAP Core</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .box {
      width: 96px; height: 96px; border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), #0b7a35);
      box-shadow: 0 20px 50px rgba(10,228,72,.3);
    }
    .sub { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="corner-tag"><span class="tag">gsap.to / from / fromTo</span></div>
  <div class="stage">
    <div class="box" id="box"></div>
    <p class="sub">base de tudo: posição, rotação, escala, cor…</p>
  </div>
  <button class="replay" onclick="play()">▶ Replay</button>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script>
    function play() {
      gsap.fromTo("#box",
        { x: -90, rotation: 0, scale: 0.5, autoAlpha: 0, borderRadius: "20px" },
        { x: 90, rotation: 360, scale: 1, autoAlpha: 1, borderRadius: "50%",
          backgroundColor: "#38bdf8", duration: 1.3, ease: "power2.inOut",
          yoyo: true, repeat: 1 });
    }
    play();
  </script>
</body>
</html>
