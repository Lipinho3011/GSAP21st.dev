<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SplitText · letra por letra</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .stage { perspective: 600px; }
    .big { color: #fff; }
    .big .char { display: inline-block; will-change: transform; }
    .sub { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="corner-tag"><span class="tag">SplitText</span></div>
  <div class="stage">
    <h1 class="big" id="h">SplitText</h1>
    <p class="sub">cada letra entra com stagger</p>
  </div>
  <button class="replay" onclick="play()">▶ Replay</button>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
  <script>
    gsap.registerPlugin(SplitText);
    let split;
    function play() {
      if (split) split.revert();
      split = new SplitText("#h", { type: "chars" });
      gsap.from(split.chars, {
        yPercent: 130, opacity: 0, rotateX: -90,
        stagger: 0.05, duration: 0.8, ease: "back.out(1.7)"
      });
    }
    document.fonts && document.fonts.ready.then(play) || play();
  </script>
</body>
</html>
