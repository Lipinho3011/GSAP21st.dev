<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MotionPathPlugin</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .sub { color: var(--muted); font-size: 13px; }
    svg { width: min(80%, 320px); height: auto; overflow: visible; }
    .track { fill: none; stroke: rgba(255,255,255,.18); stroke-width: 2; stroke-dasharray: 4 6; }
    .ship { fill: var(--accent); filter: drop-shadow(0 0 8px rgba(10,228,72,.6)); }
  </style>
</head>
<body>
  <div class="corner-tag"><span class="tag">MotionPathPlugin</span></div>
  <div class="stage">
    <svg viewBox="0 0 300 200">
      <path id="track" class="track" d="M20,150 C40,40 120,20 160,90 S260,170 280,60" />
      <path id="ship" class="ship" d="M0,-9 L11,0 L0,9 L3,0 Z" />
    </svg>
    <p class="sub">o objeto segue um path SVG (com autoRotate)</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/MotionPathPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(MotionPathPlugin);
    gsap.to("#ship", {
      duration: 4, repeat: -1, ease: "none",
      motionPath: { path: "#track", align: "#track", alignOrigin: [0.5, 0.5], autoRotate: true }
    });
  </script>
</body>
</html>
