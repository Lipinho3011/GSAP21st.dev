<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>supercollider · partículas</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    body { background: #040308; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }
    .corner-tag { z-index: 41; }
  </style>
</head>
<body>
  <div class="corner-tag"><span class="tag">canvas + GSAP (estilo PixiJS)</span></div>
  <canvas id="c"></canvas>
  <button class="replay" onclick="cycle()">▶ Replay</button>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    let W, H, particles = [];

    function resize() {
      W = canvas.width = canvas.clientWidth * devicePixelRatio;
      H = canvas.height = canvas.clientHeight * devicePixelRatio;
    }
    resize();
    addEventListener("resize", () => { resize(); buildTargets(); });

    function buildTargets() {
      const off = document.createElement("canvas");
      off.width = W; off.height = H;
      const o = off.getContext("2d");
      const size = Math.min(W * 0.22, H * 0.42);
      o.fillStyle = "#fff";
      o.textAlign = "center";
      o.textBaseline = "middle";
      o.font = `900 ${size}px Inter, system-ui, sans-serif`;
      o.fillText("COLLIDER", W / 2, H / 2);
      const data = o.getImageData(0, 0, W, H).data;
      const gap = Math.max(4, Math.round(4 * devicePixelRatio));
      const targets = [];
      for (let y = 0; y < H; y += gap) {
        for (let x = 0; x < W; x += gap) {
          if (data[(y * W + x) * 4 + 3] > 128) targets.push({ x, y });
        }
      }
      // ajusta o array de partículas ao número de alvos
      particles = targets.map((t, i) => {
        const p = particles[i] || { x: Math.random() * W, y: Math.random() * H };
        p.tx = t.x; p.ty = t.y;
        const hue = (t.x / W) * 120 + 200; // azul -> roxo -> rosa
        p.color = `hsl(${hue}, 90%, 65%)`;
        return p;
      });
    }
    buildTargets();

    function render() {
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 2.4 * devicePixelRatio, 2.4 * devicePixelRatio);
      }
    }
    gsap.ticker.add(render);

    function form() {
      particles.forEach(p => {
        gsap.to(p, { x: p.tx, y: p.ty, duration: gsap.utils.random(0.7, 1.4),
          ease: "power3.out", delay: gsap.utils.random(0, 0.4) });
      });
    }
    function dissolve() {
      particles.forEach(p => {
        const ang = Math.random() * Math.PI * 2;
        const r = gsap.utils.random(W * 0.2, W * 0.6);
        gsap.to(p, { x: p.x + Math.cos(ang) * r, y: p.y + Math.sin(ang) * r,
          duration: gsap.utils.random(0.8, 1.6), ease: "power2.in", delay: gsap.utils.random(0, 0.2) });
      });
    }

    let t1, t2;
    function cycle() {
      gsap.killTweensOf(particles);
      clearTimeout(t1); clearTimeout(t2);
      form();
      t1 = setTimeout(dissolve, 2600);
      t2 = setTimeout(cycle, 4400);
    }
    cycle();
  </script>
</body>
</html>
