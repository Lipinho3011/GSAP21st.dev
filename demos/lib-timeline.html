<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .card {
      width: min(78%, 280px); padding: 26px 24px; border-radius: 18px;
      border: 1px solid var(--border); background: var(--surface); text-align: left;
    }
    .card .k { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); }
    .card h3 { font-size: 1.5rem; margin: 8px 0; }
    .card p { color: var(--muted); font-size: 13px; }
    .card .btn { margin-top: 16px; display: inline-block; padding: 9px 16px; border-radius: 10px; background: var(--accent); color: #04240f; font-weight: 700; font-size: 13px; }
  </style>
</head>
<body>
  <div class="corner-tag"><span class="tag">gsap.timeline()</span></div>
  <div class="stage">
    <div class="card">
      <span class="k" id="k">Projeto</span>
      <h3 id="t">Sequência cinematográfica</h3>
      <p id="d">Entrada, sobreposição e finalização — em ordem.</p>
      <span class="btn" id="b">Começar →</span>
    </div>
  </div>
  <button class="replay" onclick="play()">▶ Replay</button>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script>
    function play() {
      gsap.timeline({ defaults: { ease: "power3.out" } })
        .from("#k", { y: 20, autoAlpha: 0, duration: 0.5 })
        .from("#t", { y: 30, autoAlpha: 0, duration: 0.6 }, "-=0.3")
        .from("#d", { y: 20, autoAlpha: 0, duration: 0.5 }, "-=0.35")
        .from("#b", { scale: 0.6, autoAlpha: 0, duration: 0.5, ease: "back.out(2)" }, "-=0.2")
        .to("#b", { scale: 1.06, duration: 0.3, yoyo: true, repeat: 3, ease: "sine.inOut" });
    }
    play();
  </script>
</body>
</html>
