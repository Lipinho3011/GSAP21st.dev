<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrollTrigger · horizontal</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .wrap { overflow: hidden; }
    .track {
      display: flex;
      width: 400vw;               /* 4 painéis */
      height: 100vh;
    }
    .slide {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
    }
    .slide .n { font-size: clamp(3rem, 14vw, 8rem); font-weight: 900; letter-spacing: -.04em; }
    .slide .t { position: absolute; bottom: 24%; font-weight: 600; color: rgba(255,255,255,.8); }
    .s1 { background: linear-gradient(135deg, #0a0f0b, #0e2418); }
    .s2 { background: linear-gradient(135deg, #081019, #0c2a3a); }
    .s3 { background: linear-gradient(135deg, #0d0a16, #241a3a); }
    .s4 { background: linear-gradient(135deg, #140a12, #361528); }
    .label { position: fixed; top: 16px; left: 16px; z-index: 41; }
    .progress { position: fixed; top: 0; left: 0; height: 4px; width: 100%; transform: scaleX(0); transform-origin: 0 50%; background: var(--accent); z-index: 40; }
  </style>
</head>
<body>
  <div class="progress" id="bar"></div>
  <div class="label"><span class="tag">scroll horizontal</span></div>

  <div class="wrap">
    <div class="track" id="track">
      <section class="slide s1"><div class="n">→</div><div class="t">role para baixo…</div></section>
      <section class="slide s2"><div class="n">01</div><div class="t">…e o conteúdo anda de lado</div></section>
      <section class="slide s3"><div class="n">02</div><div class="t">scroll vertical = movimento horizontal</div></section>
      <section class="slide s4"><div class="n">03</div><div class="t">fim</div></section>
    </div>
  </div>

  <div class="scroll-hint"><span class="arrow">↓</span> role para baixo para andar de lado</div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    const track = document.querySelector("#track");
    const panels = gsap.utils.toArray(".slide");

    const scrollTween = gsap.to(track, {
      xPercent: -100 * (panels.length - 1),
      ease: "none",
      scrollTrigger: {
        trigger: ".wrap",
        start: "top top",
        end: () => "+=" + track.offsetWidth, // distância vertical = largura total
        pin: true,
        scrub: 1,
        invalidateOnRefresh: true
      }
    });

    gsap.to("#bar", {
      scaleX: 1, ease: "none",
      scrollTrigger: { trigger: ".wrap", start: "top top", end: () => "+=" + track.offsetWidth, scrub: true }
    });
  </script>
</body>
</html>
