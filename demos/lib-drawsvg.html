<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrawSVGPlugin</title>
  <link rel="stylesheet" href="demo-base.css" />
  <style>
    .sub { color: var(--muted); font-size: 13px; }
    svg { width: min(70%, 240px); height: auto; }
    .stroke { fill: none; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
    .ring { stroke: rgba(255,255,255,.12); }
    .check { stroke: var(--accent); filter: drop-shadow(0 0 6px rgba(10,228,72,.5)); }
  </style>
</head>
<body>
  <div class="corner-tag"><span class="tag">DrawSVGPlugin</span></div>
  <div class="stage">
    <svg viewBox="0 0 120 120">
      <circle class="stroke ring" cx="60" cy="60" r="50" />
      <circle class="stroke check" id="circle" cx="60" cy="60" r="50" />
      <path class="stroke check" id="tick" d="M37,62 L54,79 L85,42" />
    </svg>
    <p class="sub">linhas desenhadas progressivamente</p>
  </div>
  <button class="replay" onclick="play()">▶ Replay</button>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/DrawSVGPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(DrawSVGPlugin);
    function play() {
      gsap.timeline()
        .fromTo("#circle", { drawSVG: "0%" }, { drawSVG: "100%", duration: 1, ease: "power1.inOut" })
        .fromTo("#tick", { drawSVG: "0%" }, { drawSVG: "100%", duration: 0.5, ease: "power2.out" }, "-=0.2");
    }
    play();
  </script>
</body>
</html>
